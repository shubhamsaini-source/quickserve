{% extends "base.html" %}
{% block title %}Rate Service – QuickServe{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="auth-card">
          <div class="auth-card-header text-center">
            <div class="auth-logo">⭐</div>
            <h4 class="fw-800 mt-2">Rate Your Experience</h4>
            <p class="text-muted small">Booking #{{ booking.booking_id }} — {{ booking.service_category }}</p>
          </div>
          <div class="auth-card-body">
            <form method="POST">
              <div class="mb-4">
                <label class="form-label fw-600 d-block">Your Rating</label>
                <div class="star-rating-widget" id="starWidget">
                  {% for i in range(1,6) %}
                  <span class="star-btn" data-val="{{ i }}" onclick="setStars({{ i }})">★</span>
                  {% endfor %}
                </div>
                <input type="hidden" name="stars" id="starsInput" value="5"/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-600">Written Review (optional)</label>
                <textarea name="review" class="form-control" rows="4"
                          placeholder="Share your experience with this provider..."></textarea>
              </div>
              <button type="submit" class="btn btn-qs-primary w-100 fw-600">
                <i class="fas fa-paper-plane me-2"></i>Submit Review
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
let selectedStars = 5;
function setStars(val) {
  selectedStars = val;
  document.getElementById("starsInput").value = val;
  document.querySelectorAll(".star-btn").forEach((s, idx) => {
    s.classList.toggle("active", idx < val);
  });
}
setStars(5);
</script>
{% endblock %}
