{% extends "base.html" %}
{% block title %}Register – QuickServe{% endblock %}
{% block content %}
<section class="auth-section py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="auth-card">
          <div class="auth-card-header text-center">
            <div class="auth-logo">👤</div>
            <h3 class="fw-800 mt-2">Create Account</h3>
            <p class="text-muted small">Register as a customer on QuickServe</p>
          </div>
          <div class="auth-card-body">
            <form method="POST" action="{{ url_for('register') }}">
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-600">Full Name</label>
                  <div class="input-icon-wrap">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="name" class="form-control ps-5" placeholder="Rahul Sharma" required/>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label fw-600">Email Address</label>
                  <div class="input-icon-wrap">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control ps-5" placeholder="rahul@example.com" required/>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-600">Password</label>
                  <div class="input-icon-wrap">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" class="form-control ps-5" placeholder="Min 6 chars" required/>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-600">Phone Number</label>
                  <div class="input-icon-wrap">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="text" name="phone" class="form-control ps-5" placeholder="9876543210"/>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label fw-600">Address</label>
                  <div class="input-icon-wrap">
                    <i class="fas fa-map-marker-alt input-icon"></i>
                    <input type="text" name="address" class="form-control ps-5" placeholder="Your city / area"/>
                  </div>
                </div>
                <div class="col-12 mt-2">
                  <button type="submit" class="btn btn-qs-primary w-100 btn-lg fw-600">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                  </button>
                </div>
              </div>
            </form>
          </div>
          <div class="auth-card-footer text-center">
            <p class="text-muted small mb-1">Already have an account? <a href="{{ url_for('login') }}" class="link-accent">Login here</a></p>
            <p class="text-muted small">Want to offer services? <a href="{{ url_for('register_provider') }}" class="link-accent">Join as Provider</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
